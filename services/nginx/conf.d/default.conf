upstream voxagent_api {
    server api:8000;
}

upstream dograh_bridge {
    server dograh:8010;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    charset utf-8;

    location /health {
        proxy_pass http://voxagent_api/health;
    }

    location /ready {
        proxy_pass http://voxagent_api/ready;
    }

    location /dograh/ {
        rewrite ^/dograh/(.*)$ /$1 break;
        proxy_pass http://dograh_bridge;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://voxagent_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
