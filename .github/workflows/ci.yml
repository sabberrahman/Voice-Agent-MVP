name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API
        working-directory: services/api
        run: pip install -e ".[dev]"
      - name: Lint API
        working-directory: services/api
        run: ruff check app
      - name: Test API
        run: pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Web
        working-directory: services/web
        run: npm install
      - name: Typecheck Web
        working-directory: services/web
        run: npm run typecheck
      - name: Build Web
        working-directory: services/web
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config
      - name: Build Images
        run: docker compose build
