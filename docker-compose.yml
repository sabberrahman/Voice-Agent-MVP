name: voxagent-mvp

services:
  zoiper-info:
    image: alpine:3.20
    env_file: .env
    command:
      - sh
      - -c
      - |
        echo "";
        echo "============================================================";
        echo " ZOIPER COPY-PASTE SETTINGS";
        echo "============================================================";
        echo " Host / Domain : ${ZOIPER_HOST_IP:-127.0.0.1}";
        echo " SIP Port      : ${FREESWITCH_SIP_PORT:-5060}";
        echo " Transport     : UDP";
        echo "";
        echo " Account 1001";
        echo "   User        : 1001";
        echo "   Password    : ${FREESWITCH_EXTENSION_1001_PASSWORD:-1001pass}";
        echo "   Call AI     : 7000";
        echo "";
        echo " Account 1002";
        echo "   User        : 1002";
        echo "   Password    : ${FREESWITCH_EXTENSION_1002_PASSWORD:-1002pass}";
        echo "";
        echo " Outbound AI test endpoint:";
        echo "   POST http://localhost:${APP_PORT:-8000}/admin/start-outbound-zoiper/1001";
        echo "============================================================";
        echo "";
    restart: "no"

  api:
    build:
      context: ./services/api
    env_file: .env
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - api_logs:/var/log/voxagent
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  dograh:
    build:
      context: ./services/dograh
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
      freeswitch:
        condition: service_healthy
    ports:
      - "${DOGRAH_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build:
      context: ./services/web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  freeswitch:
    build:
      context: ./services/pbx
    env_file: .env
    ports:
      - "${FREESWITCH_SIP_PORT:-5060}:5060/udp"
      - "${FREESWITCH_SIP_PORT:-5060}:5060/tcp"
      - "${FREESWITCH_RTP_START:-16384}-${FREESWITCH_RTP_END:-16484}:16384-16484/udp"
    volumes:
      - freeswitch_recordings:/recordings
      - freeswitch_logs:/var/log/freeswitch
    healthcheck:
      test: ["CMD", "fs_cli", "-x", "status"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voxagent}
      POSTGRES_USER: ${POSTGRES_USER:-voxagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxagent_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxagent} -d ${POSTGRES_DB:-voxagent}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      dograh:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./services/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  freeswitch_recordings:
  freeswitch_logs:
  api_logs:
